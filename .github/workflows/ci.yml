name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore StickFigurez.sln

      - name: Build
        run: dotnet build StickFigurez.sln -c Release --no-restore

      - name: Pack (verify)
        run: dotnet pack src/StickFigurez/StickFigurez.csproj -c Release --no-build -o artifacts

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: artifacts/*.*nupkg
